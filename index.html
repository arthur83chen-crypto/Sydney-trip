<!-- 1. 首先引入獨立的行程與清單資料檔 -->
<script src="trip-data.js"></script>

<!-- 2. 主程式核心控制與邏輯運算 -->
<script>
// ==========================================
// 核心全域變數安全校驗 (防止 trip-data.js 載入失敗)
// ==========================================
window.EX_RATE = window.EX_RATE || 21.5; // 預設澳幣匯率
window.members = window.members || ['arthur', 'karen', 'steven', 'dage'];
window.memberNames = window.memberNames || { arthur: 'Arthur', karen: 'Karen', steven: 'Steven', dage: '大哥' };
window.memberEmojis = window.memberEmojis || { arthur: '🧑‍💻', karen: '👩‍🦰', steven: '👦', dage: '👨' };
window.itineraryData = window.itineraryData || [];
window.taskData = window.taskData || [];
window.packingData = window.packingData || {};
window.englishData = window.englishData || [];

let currentDayIdx = 0;
let selectedPayer = window.members[0] || 'arthur';
let selectedConsumers = [...window.members];

// 從本機儲存空間（Browser LocalStorage）讀取打卡與記帳狀態
let db_spots = JSON.parse(localStorage.getItem('v3_spots') || '{}');
let db_expenses = JSON.parse(localStorage.getItem('v3_expenses') || '[]');
let db_tasks = JSON.parse(localStorage.getItem('v3_tasks') || '{}');
let db_pack = JSON.parse(localStorage.getItem('v3_pack') || '{}');

// 初始排行榜分數 (若無紀錄則從資料檔讀取預設，或歸零)
let defaultScores = {};
window.members.forEach(m => { defaultScores[m] = 0; });
let db_scores = JSON.parse(localStorage.getItem('v3_scores') || JSON.stringify(defaultScores));

function saveState() {
  localStorage.setItem('v3_spots', JSON.stringify(db_spots));
  localStorage.setItem('v3_expenses', JSON.stringify(db_expenses));
  localStorage.setItem('v3_tasks', JSON.stringify(db_tasks));
  localStorage.setItem('v3_pack', JSON.stringify(db_pack));
  localStorage.setItem('v3_scores', JSON.stringify(db_scores));
}

// 智慧型動態島控制
function triggerIsland(msg, isExpanded = false) {
  const island = document.getElementById('island');
  const txt = document.getElementById('di-txt');
  if(!island || !txt) return;
  
  txt.textContent = msg;
  if (isExpanded) {
    island.classList.add('expanded');
    setTimeout(() => { island.classList.remove('expanded'); }, 4000);
  } else {
    island.classList.remove('expanded');
  }
}
function toggleIsland() {
  const island = document.getElementById('island');
  if(island) island.classList.toggle('expanded');
}

// 核心功能頁面切換
function switchSection(secId) {
  const sections = ['itin', 'exp', 'score', 'pack', 'eng', 'sos'];
  sections.forEach(sec => {
    const el = document.getElementById('sec-' + sec);
    const btn = document.getElementById('btn-tab-' + sec);
    if(el) el.style.display = (sec === secId) ? 'block' : 'none';
    if(btn) btn.classList.toggle('active', sec === secId);
  });
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
  
  if(secId === 'itin') renderItinerary();
  if(secId === 'exp') renderExpenseSystem();
  if(secId === 'score') renderScoresAndTasks();
  if(secId === 'pack') renderPackList();
  if(secId === 'eng') renderEnglishPhrases();
}

// 頂部橫幅照片輪播
let currentSlide = 0;
function initCarousel() {
  const track = document.getElementById('carousel-track');
  const slides = document.querySelectorAll('.carousel-slide');
  const dotsContainer = document.getElementById('carousel-dots');
  
  if(!track || !slides.length || !dotsContainer) return;
  dotsContainer.innerHTML = Array.from({length: slides.length}).map((_,i) => `<div class="c-dot ${i===0?'active':''}"></div>`).join('');
  const dots = document.querySelectorAll('.c-dot');

  setInterval(() => {
    currentSlide = (currentSlide + 1) % slides.length;
    track.style.transform = `translateX(-${currentSlide * 100}%)`;
    dots.forEach((d, idx) => d.classList.toggle('active', idx === currentSlide));
  }, 4500);
}

// 1. 行程模組渲染
function renderItinerary() {
  const tabs = document.getElementById('day-tabs');
  const listContainer = document.getElementById('itin-list');
  if(!tabs || !listContainer) return;

  if(!window.itineraryData.length) {
    tabs.innerHTML = '';
    listContainer.innerHTML = '<div style="color:var(--text-sub);text-align:center;padding:20px;">暫無行程資料</div>';
    return;
  }

  tabs.innerHTML = window.itineraryData.map((d, idx) => `
    <button class="day-tab ${idx === currentDayIdx ? 'active' : ''}" onclick="changeDay(${idx})">
      Day ${d.day} (${d.date})
    </button>`).join('');

  const currentDay = window.itineraryData[currentDayIdx];
  if(!currentDay) { listContainer.innerHTML = ''; return; }
  
  listContainer.innerHTML = currentDay.spots.map(s => {
    const isCompleted = db_spots[s.id] ? true : false;
    return `
      <div class="spot-card ${isCompleted ? 'completed' : ''}" id="card_${s.id}">
        <div class="spot-img-wrap" onclick="toggleDetails('${s.id}')">
          <img src="${s.img}" alt="${s.name}" loading="lazy">
          <div class="spot-tag">📍 點擊看詳情</div>
        </div>
        <div class="spot-info">
          <div class="spot-top">
            <div class="spot-cb" onclick="toggleSpotDone('${s.id}'); event.stopPropagation();">${isCompleted ? '✓' : ''}</div>
            <div class="spot-title" onclick="toggleDetails('${s.id}')">${s.name}</div>
          </div>
          <div class="spot-details" id="details_${s.id}">
            <p style="margin: 6px 0; font-size:0.78rem; color:#d1d1d6;">${s.desc}</p>
            <div class="spot-actions">
              <a class="btn-action nav-btn" href="https://maps.google.com/?q=${encodeURIComponent(s.map)}" target="_blank">🗺️ 導航直達景點</a>
              <button class="btn-action" onclick="triggerIsland('📍 目前選定景點：${s.name}')">📸 景點註記</button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}
function changeDay(idx) { currentDayIdx = idx; renderItinerary(); }
function toggleDetails(id) { 
  const el = document.getElementById('details_' + id);
  if(el) el.classList.toggle('open'); 
}
function toggleSpotDone(id) {
  db_spots[id] = !db_spots[id];
  saveState();
  renderItinerary();
  updateGlobalDashboard();
  if(db_spots[id]) triggerIsland("🎉 成功解鎖一個景點進度！", true);
}

// 2. 智慧記帳系統
function renderExpenseChips() {
  const payerContainer = document.getElementById('payer-chips');
  const splitContainer = document.getElementById('split-chips');
  if(!payerContainer || !splitContainer) return;

  payerContainer.innerHTML = window.members.map(m => `
    <div class="chip ${m === selectedPayer ? 'selected' : ''}" onclick="selectPayer('${m}')">
      ${window.memberEmojis[m] || '👤'} ${window.memberNames[m] || m}
    </div>`).join('');

  splitContainer.innerHTML = window.members.map(m => `
    <div class="chip ${selectedConsumers.includes(m) ? 'selected' : ''}" onclick="toggleConsumer('${m}')">
      ${window.memberEmojis[m] || '👤'} ${window.memberNames[m] || m}
    </div>`).join('');
}
function selectPayer(m) { selectedPayer = m; renderExpenseChips(); }
function toggleConsumer(m) {
  if (selectedConsumers.includes(m)) {
    if (selectedConsumers.length > 1) selectedConsumers = selectedConsumers.filter(item => item !== m);
  } else {
    selectedConsumers.push(m);
  }
  renderExpenseChips();
}

function submitExpense() {
  const amtInput = document.getElementById('exp-amt');
  const descInput = document.getElementById('exp-desc');
  const catInput = document.getElementById('exp-cat');
  if(!amtInput || !descInput || !catInput) return;
  
  const amt = parseFloat(amtInput.value);
  const desc = descInput.value.trim();
  const cat = catInput.value;
  
  if(!amt || !desc) { alert("請輸入正確的金額與明細！"); return; }
  
  db_expenses.push({
    amt: amt, desc: desc, cat: cat, payer: selectedPayer, consumers: [...selectedConsumers], date: new Date().toLocaleDateString()
  });
  
  if(db_scores[selectedPayer] !== undefined) db_scores[selectedPayer] += 5; 
  saveState();
  
  amtInput.value = ''; descInput.value = '';
  renderExpenseSystem();
  updateGlobalDashboard();
  triggerIsland(`💰 已記錄 ${desc} $${amt} AUD`, true);
}

function deleteExpense(idx) {
  db_expenses.splice(idx, 1);
  saveState();
  renderExpenseSystem();
  updateGlobalDashboard();
}

function renderExpenseSystem() {
  renderExpenseChips();
  const totalAUD = db_expenses.reduce((sum, e) => sum + e.amt, 0);
  
  const audEl = document.getElementById('summary-aud');
  const twdEl = document.getElementById('summary-twd');
  if(audEl) audEl.textContent = `$${totalAUD.toFixed(2)}`;
  if(twdEl) twdEl.textContent = `NT$ ${Math.round(totalAUD * window.EX_RATE).toLocaleString()}`;
  
  let balances = {};
  window.members.forEach(m => balances[m] = 0);
  
  db_expenses.forEach(e => {
    if(balances[e.payer] !== undefined) balances[e.payer] += e.amt;
    let share = e.amt / e.consumers.length;
    e.consumers.forEach(c => { if(balances[c] !== undefined) balances[c] -= share; });
  });

  let debtHTML = '';
  for(let [person, bal] of Object.entries(balances)) {
    if (bal > 0.01) {
      debtHTML += `<div style="color:var(--accent-green)">🟢 <strong>${window.memberNames[person] || person}</strong> 總共代墊，應收回：<strong>$${bal.toFixed(2)} AUD</strong></div>`;
    } else if (bal < -0.01) {
      debtHTML += `<div style="color:var(--accent-red)">🔴 <strong>${window.memberNames[person] || person}</strong> 應補繳付出：<strong>$${Math.abs(bal).toFixed(2)} AUD</strong></div>`;
    }
  }
  const settEl = document.getElementById('settlement-results');
  if(settEl) settEl.innerHTML = debtHTML || '<div style="color:var(--text-sub)">目前各項目分帳皆完美平衡！</div>';

  const hist = document.getElementById('history-list');
  if(!hist) return;
  if(!db_expenses.length) { hist.innerHTML = '<div style="color:var(--text-sub);text-align:center;padding:10px;">暫無明細</div>'; return; }
  
  hist.innerHTML = db_expenses.map((e, idx) => `
    <div class="history-item">
      <div>
        <strong>[${e.cat}] ${e.desc}</strong>
        <div style="font-size:0.68rem; color:var(--text-sub)">墊付: ${window.memberNames[e.payer] || e.payer} | 分攤: ${e.consumers.map(c=>window.memberNames[c] || c).join(', ')}</div>
      </div>
      <div style="text-align:right; display:flex; align-items:center; gap:8px;">
        <span style="font-weight:bold; color:#ffd60a;">$${e.amt.toFixed(1)}</span>
        <span style="color:var(--accent-red); cursor:pointer; font-weight:bold; padding:4px 8px;" onclick="deleteExpense(${idx})">✕</span>
      </div>
    </div>`).reverse().join('');
}

// 3. 排行榜與打卡任務成就模組
function getPlayerTitle(pt) {
  if (pt >= 150) return '👑 澳洲大富翁公路傳奇';
  if (pt >= 100) return '🥇 專業自駕首席領航員';
  if (pt >= 50) return '🥈 資深全能冒險家';
  return '🥉 隨隊觀光實習生';
}

function renderScoresAndTasks() {
  const wallEl = document.getElementById('photo-wall');
  const leadEl = document.getElementById('leaderboard-list');
  const taskEl = document.getElementById('task-grid');
  
  if(wallEl) {
    wallEl.innerHTML = window.taskData.map(t => {
      const isDone = db_tasks[t.id] ? true : false;
      return `<div class="pwall-cell ${isDone?'active':''}"><div class="pwall-ico">${t.icon}</div><div class="pwall-lbl">${t.name.substring(0,3)}</div></div>`;
    }).join('');
  }

  if(leadEl) {
    const sorted = [...window.members].sort((a,b) => (db_scores[b]||0) - (db_scores[a]||0));
    leadEl.innerHTML = sorted.map((m, idx) => `
      <div class="rank-card">
        <div class="rank-num">${idx+1}</div>
        <div class="rank-avatar">${window.memberEmojis[m] || '👤'}</div>
        <div class="rank-info">
          <div class="rank-name">${window.memberNames[m] || m}</div>
          <div class="rank-title">${getPlayerTitle(db_scores[m] || 0)}</div>
        </div>
        <div class="rank-pts">${db_scores[m] || 0} pt</div>
      </div>`).join('');
  }

  if(taskEl) {
    taskEl.innerHTML = window.taskData.map(t => {
      const isDone = db_tasks[t.id];
      return `
        <div class="task-item ${isDone?'done':''}" onclick="claimTask('${t.id}', ${t.pts})">
          <div class="task-icon">${t.icon}</div>
          <div class="task-name">${t.name}</div>
          <div class="task-pts">+${t.pts} pt</div>
          ${isDone ? `<div class="task-assignee">✓ ${window.memberNames[isDone] || isDone}</div>` : `
            <select id="sel_${t.id}" onclick="event.stopPropagation()" style="font-size:0.65rem; margin-top:4px; background:#2c2c2e; color:#fff; border:none; border-radius:4px; padding:2px;">
              ${window.members.map(m=>`<option value="${m}">${window.memberNames[m] || m}</option>`).join('')}
            </select>
          `}
        </div>`;
    }).join('');
  }
}

function claimTask(id, pts) {
  if (db_tasks[id]) return;
  const sel = document.getElementById('sel_' + id);
  if(!sel) return;
  const winner = sel.value;
  db_tasks[id] = winner;
  if(db_scores[winner] !== undefined) db_scores[winner] += pts;
  saveState();
  renderScoresAndTasks();
  triggerIsland(`🏆 ${window.memberNames[winner] || winner} 解鎖成就 ＋${pts}分！`, true);
}

// 4. 行李清單模組
function renderPackList() {
  const container = document.getElementById('pack-container');
  if(!container) return;
  
  let html = '';
  for (let [groupName, items] of Object.entries(window.packingData)) {
    html += `<div class="pack-group-title">${groupName}</div>`;
    items.forEach(item => {
      const isChecked = db_pack[item] ? true : false;
      html += `
        <div class="pack-item ${isChecked?'checked':''}" onclick="togglePackItem('${item}')">
          <div class="pack-checkbox">${isChecked?'✓':''}</div>
          <div class="pack-txt">${item}</div>
        </div>`;
    });
  }
  container.innerHTML = html || '<div style="color:var(--text-sub);text-align:center;padding:20px;">暫無行李清單資料</div>';
}
function togglePackItem(item) {
  db_pack[item] = !db_pack[item];
  saveState();
  renderPackList();
}

// 5. 生存英文句庫模組
function renderEnglishPhrases() {
  const container = document.getElementById('english-container');
  if(!container) return;
  
  container.innerHTML = window.englishData.map(e => `
    <div class="phrase-card">
      <div class="phrase-ctx">💡 行程現場場景：${e.q}</div>
      <div class="phrase-eng">"${e.e}"</div>
      <div class="phrase-zht">中文意思：${e.c}</div>
    </div>`).join('') || '<div style="color:var(--text-sub);text-align:center;padding:20px;">暫無生存英文資料</div>';
}

// 全局儀表板與進度條刷新
function updateGlobalDashboard() {
  const totalAUD = db_expenses.reduce((sum, e) => sum + e.amt, 0);
  const dbExp = document.getElementById('db-exp');
  if(dbExp) dbExp.textContent = `$${totalAUD.toFixed(1)}`;
  
  let currentLoc = 'Sydney';
  let totalSpots = 0; let doneSpots = 0;
  window.itineraryData.forEach(day => {
    day.spots.forEach(s => {
      totalSpots++;
      if (db_spots[s.id]) { doneSpots++; currentLoc = day.loc; }
    });
  });
  
  const dbLoc = document.getElementById('db-loc');
  const pflowPct = document.getElementById('pflow-pct');
  if(dbLoc) dbLoc.textContent = currentLoc;
  if(pflowPct) pflowPct.textContent = totalSpots > 0 ? `${Math.round((doneSpots / totalSpots) * 100)}%` : '0%';

  const mapNodes = { 'Sydney':'pf-syd', 'Blue Mountains':'pf-blue', 'Kiama':'pf-kiama', 'Coffs Harbour':'pf-coffs', 'Byron Bay':'pf-byron', 'Brisbane':'pf-bris' };
  let passed = true;
  for (let [locName, elId] of Object.entries(mapNodes)) {
    const node = document.getElementById(elId);
    if(node) {
      node.classList.remove('active', 'done');
      if (locName === currentLoc) { node.classList.add('active'); passed = false; }
      else if (passed) { node.classList.add('done'); }
    }
  }
}

// 網頁啟動初始化
window.onload = function() {
  initCarousel();
  renderItinerary();
  updateGlobalDashboard();
  triggerIsland("🚀 歡迎使用雪梨自駕 V3 系統", false);
};
</script>
